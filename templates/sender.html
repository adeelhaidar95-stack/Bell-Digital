<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Bell Sender</title>
  <link rel="stylesheet" href="static/sender.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" href="static/images/bell.svg">
</head>
<body>
  <div class="container">
    <button id="bell" class="bell">
      <i class="fa-solid fa-bell fa-shake" style="color: #ffffff;"></i> &nbsp; BEL
    </button>
  </div>
<script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
<script>

  const bellButton = document.getElementById("bell");

  bellButton.addEventListener("click", () => {
    console.log("Tombol ditekan, mengirim sinyal...");

    fetch('/push-bell', { method: 'POST' })
      .then(response => {
        if (response.ok) {
          console.log("BEL BERHASIL DIKIRIM KE SERVER");
        }
      })
      .catch(err => console.error("Gagal mengirim:", err));
  });
</script>

</body>
</html>
